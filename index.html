<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="initial-scale=1,user-scalable=no,maximum-scale=1,width=device-width">
        <meta name="mobile-web-app-capable" content="yes">
        <meta name="apple-mobile-web-app-capable" content="yes">
        <link rel="stylesheet" href="./resources/ol.css">
        <link rel="stylesheet" href="resources/fontawesome-all.min.css">
        <link href="resources/photon-geocoder-autocomplete.min.css" rel="stylesheet">
        <link rel="stylesheet" href="./resources/ol-layerswitcher.css">
        <link rel="stylesheet" href="./resources/qgis2web.css">
        <style>
        html, body, #map {
            width: 100%;
            height: 100%;
            padding: 0;
            margin: 0;
        }
        body {
            background: linear-gradient(180deg, #d8eaf4 0%, #c4dceb 40%, #adc9dd 100%);
            font-family: "Trebuchet MS", "Segoe UI", sans-serif;
        }
        #map {
            background: radial-gradient(circle at 15% 20%, #d4e6f1 0%, #b9d6e8 35%, #98bdd5 100%);
        }
        #map-title {
            position: absolute;
            top: 14px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1200;
            padding: 10px 18px;
            border-radius: 12px;
            background: rgba(15, 37, 56, 0.78);
            color: #f4fbff;
            font-size: 20px;
            font-weight: 700;
            letter-spacing: 0.4px;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.24);
            border: 1px solid rgba(255, 255, 255, 0.24);
            backdrop-filter: blur(4px);
            pointer-events: none;
        }
        #page-card-stack {
            position: absolute;
            left: 18px;
            bottom: 18px;
            z-index: 1200;
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 156px;
        }
        #page-logo {
            box-sizing: border-box;
            width: 100%;
            padding: 8px;
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.78);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.18);
            backdrop-filter: blur(4px);
        }
        #page-credit-box {
            box-sizing: border-box;
            width: 100%;
            padding: 0;
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.82);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.18);
            backdrop-filter: blur(4px);
            overflow: hidden;
        }
        #page-credit-toggle {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            padding: 10px 12px;
            border: 0;
            background: transparent;
            color: rgba(17, 40, 59, 0.92);
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.2px;
            cursor: pointer;
            text-align: left;
        }
        #page-credit-toggle:after {
            content: "+";
            font-size: 16px;
            line-height: 1;
        }
        #page-credit-box.is-open #page-credit-toggle:after {
            content: "-";
        }
        #page-logo-label {
            margin: 0 0 6px 2px;
            color: rgba(17, 40, 59, 0.85);
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.2px;
        }
        #page-credit-text {
            display: none;
            margin: 0;
            padding: 0 12px 12px 12px;
            color: rgba(17, 40, 59, 0.85);
            font-size: 11px;
            line-height: 1.35;
        }
        #page-credit-box.is-open #page-credit-text {
            display: block;
        }
        #page-logo img {
            display: block;
            width: 140px;
            height: auto;
        }
        .ol-control {
            background-color: rgba(255,255,255,.28) !important;
            padding: 2px !important;
            border-radius: 10px !important;
            box-shadow: 0 8px 18px rgba(0, 0, 0, 0.18);
        }
        .ol-control > * {
            background-color: rgba(255,255,255,.94) !important;
            color: #123147 !important;
            border-radius: 10px !important;
        }
        .ol-control > *:focus,
        .ol-control > *:hover {
            background-color: rgba(244, 250, 253, 0.96) !important;
        }
        .ol-attribution a,
        .gcd-gl-input::placeholder,
        .search-layer-input-search::placeholder {
            color: #123147 !important;
        }
        .search-layer-input-search {
            background-color: rgba(255,255,255,.94) !important;
        }
        .layer-switcher {
            top: 4.5em;
            right: 0.5em;
        }
        .layer-switcher.shown {
            background: rgba(255,255,255,.94);
            border-radius: 14px;
            box-shadow: 0 10px 24px rgba(0, 0, 0, 0.2);
            overflow: hidden;
        }
        .layer-switcher button {
            background-color: rgba(255,255,255,.94) !important;
        }
        @media (max-width: 700px) {
            #map-title {
                top: 10px;
                font-size: 16px;
                padding: 8px 12px;
            }
            #page-card-stack {
                left: 12px;
                bottom: 12px;
                width: 156px;
            }
        }
        </style>
        <title>15 con 106</title>
    </head>
    <body>
        <div id="map-title">Mapa informativo 15 con 106</div>
        <div id="page-card-stack">
            <div id="page-credit-box">
                <button id="page-credit-toggle" type="button">Informacion de autoria</button>
                <div id="page-credit-text">Geoprocesamiento y visualizaciones:<br>Juan P. Gomez<br>jugomezuri@gmail.com</div>
            </div>
            <div id="page-logo">
                <div id="page-logo-label">Solicitado por:</div>
                <img src="images/optimizacion-predios-sas.png" alt="Optimizacion de predios SAS">
            </div>
        </div>
        <div id="map">
            <div id="popup" class="ol-popup">
                <a href="#" id="popup-closer" class="ol-popup-closer"></a>
                <div id="popup-content"></div>
            </div>
        </div>
        <script src="resources/qgis2web_expressions.js"></script>
        <script src="./resources/functions.js"></script>
        <script src="./resources/ol.js"></script>
        <script src="./resources/ol-layerswitcher.js"></script>
        <script src="resources/photon-geocoder-autocomplete.min.js"></script>
        <script src="layers/PrediosImportantesp_relevantes2_copiar_2.js"></script>
        <script src="styles/PrediosImportantesp_relevantes2_copiar_2_style.js"></script>
        <script src="./layers/layers.js" type="text/javascript"></script> 
        <script src="./resources/Autolinker.min.js"></script>
        <script src="./resources/qgis2web.js"></script>
        <script>
        document.getElementById('page-credit-toggle').addEventListener('click', function() {
            document.getElementById('page-credit-box').classList.toggle('is-open');
        });
        </script>
    </body>
</html>
